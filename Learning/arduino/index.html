<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arduino Learning — MakerHub MM</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #22c55e;
        --green2: #16a34a;
        --cyan: #06b6d4;
        --purple: #a855f7;
        --blue: #3b82f6;
        --orange: #f97316;
        --yellow: #eab308;
        --red: #ef4444;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --bg2: #161b22;
        --card: #1c2128;
        --card2: #21262d;
        --text: #e6edf3;
        --muted: #7d8590;
        --muted2: #b1bac4;
        --border: #30363d;
        --border2: #3d444d;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      }
      [data-theme="light"] {
        --bg: #f0f4f8;
        --bg2: #ffffff;
        --card: #ffffff;
        --card2: #f6f8fa;
        --text: #1f2328;
        --muted: #636c76;
        --muted2: #424a53;
        --border: #d1d9e0;
        --border2: #b8c0cc;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Nunito", sans-serif;
        font-size: 14px;
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 10px;
      }

      /* ── NAVBAR ── */
      .navbar-c {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 300;
        backdrop-filter: blur(16px);
      }
      .nav-inner {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 24px;
        max-width: 1400px;
        margin: auto;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--green), var(--cyan));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Space Mono", monospace;
        font-weight: 700;
        color: #fff;
        font-size: 14px;
      }
      .brand-name {
        font-size: 0.95rem;
        font-weight: 900;
        letter-spacing: -0.3px;
      }
      .brand-name .g {
        color: var(--green);
      }
      .nav-right {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--card);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.18s;
      }
      .icon-btn:hover {
        border-color: var(--green);
        color: var(--green);
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 9px;
        border: 1.5px solid var(--border);
        background: var(--card);
        color: var(--muted2);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.18s;
      }
      .back-btn:hover {
        border-color: var(--green);
        color: var(--green);
      }

      /* ── ROADMAP HEADER ── */
      .roadmap-header {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 28px 0;
      }
      .roadmap-inner {
        max-width: 1400px;
        margin: auto;
        padding: 0 24px;
      }
      .roadmap-title {
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }
      .roadmap-sub {
        color: var(--muted);
        font-size: 13.5px;
      }
      .progress-row {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 18px;
      }
      .progress-track {
        flex: 1;
        height: 9px;
        background: var(--border2);
        border-radius: 100px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--cyan));
        border-radius: 100px;
        transition: width 0.8s ease;
      }
      .progress-label {
        font-size: 12px;
        font-weight: 800;
        color: var(--green);
        white-space: nowrap;
      }

      /* ── TOPIC GRID ── */
      .topic-grid {
        max-width: 1400px;
        margin: auto;
        padding: 28px 24px;
      }
      .topic-card {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 0;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.22s;
        position: relative;
      }
      .topic-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
        border-color: var(--border2);
      }
      .topic-card.completed {
        border-color: rgba(34, 197, 94, 0.4);
      }
      .topic-card.locked {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .topic-card-top {
        height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        position: relative;
      }
      .topic-card-body {
        padding: 14px;
      }
      .topic-num {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 4px;
      }
      .topic-title {
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 6px;
        line-height: 1.35;
      }
      .topic-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: var(--muted);
      }
      .topic-status {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
      }
      .status-done {
        background: rgba(34, 197, 94, 0.18);
        color: var(--green);
      }
      .status-active {
        background: rgba(59, 130, 246, 0.18);
        color: var(--blue);
      }
      .status-lock {
        background: var(--card2);
        color: var(--muted);
      }
      .topic-streak-dot {
        width: 7px;
        height: 7px;
        border-radius: 2px;
        display: inline-block;
        margin-right: 2px;
      }

      /* ── LEARNING VIEW ── */
      #learn-view {
        display: none;
      }
      .learn-layout {
        display: flex;
        height: calc(100vh - 53px);
        overflow: hidden;
      }

      /* Sidebar */
      .learn-sidebar {
        width: 260px;
        flex-shrink: 0;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-title {
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .sidebar-progress {
        background: var(--border2);
        border-radius: 100px;
        height: 6px;
        overflow: hidden;
        margin-bottom: 6px;
      }
      .sidebar-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--cyan));
        border-radius: 100px;
        transition: width 0.5s;
      }
      .sidebar-progress-text {
        font-size: 10px;
        color: var(--muted);
        font-weight: 600;
      }
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 9px;
        cursor: pointer;
        transition: all 0.15s;
        margin-bottom: 2px;
      }
      .sidebar-item:hover {
        background: var(--card2);
      }
      .sidebar-item.active {
        background: rgba(34, 197, 94, 0.1);
        color: var(--green);
      }
      .sidebar-item.done-item .sidebar-item-num {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .sidebar-item-num {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: var(--card2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "Space Mono", monospace;
      }
      .sidebar-item-title {
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
      }
      .sidebar-item-check {
        margin-left: auto;
        color: var(--green);
        font-size: 13px;
        flex-shrink: 0;
      }

      /* Content area */
      .learn-content {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .content-body {
        flex: 1;
        padding: 32px 40px;
        max-width: 780px;
        margin: 0 auto;
        width: 100%;
      }
      .content-eyebrow {
        font-size: 10.5px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 8px;
      }
      .content-title {
        font-size: 1.6rem;
        font-weight: 900;
        letter-spacing: -0.5px;
        margin-bottom: 16px;
        line-height: 1.15;
      }
      .content-section {
        margin-bottom: 28px;
      }
      .content-section h3 {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .content-section p {
        color: var(--muted2);
        line-height: 1.8;
        font-size: 13.5px;
        margin-bottom: 10px;
      }
      .content-section ul {
        color: var(--muted2);
        line-height: 1.8;
        font-size: 13.5px;
        padding-left: 18px;
      }
      .content-section ul li {
        margin-bottom: 4px;
      }
      .code-block {
        background: var(--card2);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        color: #86e89d;
        overflow-x: auto;
        margin: 12px 0;
        position: relative;
      }
      .code-block .code-label {
        font-size: 10px;
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        display: block;
        font-family: "Nunito", sans-serif;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 12.5px;
      }
      .data-table th {
        background: var(--card2);
        padding: 8px 12px;
        text-align: left;
        font-weight: 800;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .data-table td {
        padding: 8px 12px;
        border: 1px solid var(--border);
        color: var(--muted2);
        font-family: "Space Mono", monospace;
        font-size: 11.5px;
      }
      .data-table tr:nth-child(even) td {
        background: var(--card2);
      }
      .info-box {
        border-radius: 10px;
        padding: 14px 16px;
        margin: 14px 0;
        font-size: 13px;
        line-height: 1.6;
      }
      .info-box-green {
        background: rgba(34, 197, 94, 0.08);
        border: 1px solid rgba(34, 197, 94, 0.2);
        color: var(--muted2);
      }
      .info-box-blue {
        background: rgba(59, 130, 246, 0.08);
        border: 1px solid rgba(59, 130, 246, 0.2);
        color: var(--muted2);
      }
      .info-box-orange {
        background: rgba(249, 115, 22, 0.08);
        border: 1px solid rgba(249, 115, 22, 0.2);
        color: var(--muted2);
      }

      /* Content footer */
      .content-footer {
        border-top: 1px solid var(--border);
        padding: 20px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: var(--bg2);
      }
      .btn-quiz {
        background: linear-gradient(135deg, var(--green), var(--cyan));
        color: #071a0e;
        border: none;
        border-radius: 10px;
        padding: 11px 24px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 13.5px;
        cursor: pointer;
        transition: all 0.18s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-quiz:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
      }
      .btn-prev,
      .btn-next {
        padding: 10px 18px;
        border-radius: 9px;
        border: 1.5px solid var(--border);
        background: var(--card);
        color: var(--muted2);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.18s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-prev:hover,
      .btn-next:hover {
        border-color: var(--green);
        color: var(--green);
      }
      .btn-prev:disabled,
      .btn-next:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* ── QUIZ OVERLAY ── */
      .quiz-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(6px);
      }
      .quiz-modal {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 18px;
        width: 100%;
        max-width: 540px;
        padding: 28px;
        position: relative;
        animation: quizPop 0.3s ease;
      }
      @keyframes quizPop {
        from {
          opacity: 0;
          transform: scale(0.94) translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .quiz-close {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 30px;
        height: 30px;
        border-radius: 7px;
        border: 1.5px solid var(--border);
        background: var(--card2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--muted);
        font-size: 14px;
        transition: all 0.15s;
      }
      .quiz-close:hover {
        border-color: var(--red);
        color: var(--red);
      }
      .quiz-eyebrow {
        font-size: 10.5px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: var(--cyan);
        margin-bottom: 8px;
      }
      .quiz-question-title {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 20px;
        line-height: 1.4;
      }
      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .quiz-opt {
        padding: 12px 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--card2);
        cursor: pointer;
        transition: all 0.18s;
        font-size: 13px;
        font-weight: 600;
        text-align: left;
      }
      .quiz-opt:hover {
        border-color: var(--blue);
        background: rgba(59, 130, 246, 0.07);
      }
      .quiz-opt.selected {
        border-color: var(--blue);
        background: rgba(59, 130, 246, 0.12);
        color: var(--blue);
      }
      .quiz-opt.correct {
        border-color: var(--green);
        background: rgba(34, 197, 94, 0.12);
        color: var(--green);
      }
      .quiz-opt.wrong {
        border-color: var(--red);
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
      }
      .quiz-progress-bar {
        display: flex;
        gap: 4px;
        margin-bottom: 18px;
      }
      .quiz-dot {
        flex: 1;
        height: 4px;
        border-radius: 100px;
        background: var(--border2);
        transition: all 0.3s;
      }
      .quiz-dot.done {
        background: var(--green);
      }
      .quiz-dot.current {
        background: var(--cyan);
      }
      .quiz-feedback {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 600;
        display: none;
      }
      .quiz-feedback.show {
        display: block;
      }
      .quiz-feedback.correct {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.25);
        color: var(--green);
      }
      .quiz-feedback.wrong {
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: var(--red);
      }
      .quiz-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 18px;
      }
      .btn-next-q {
        background: var(--green);
        color: #071a0e;
        border: none;
        border-radius: 9px;
        padding: 10px 20px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-next-q:hover {
        background: var(--green2);
      }
      .btn-next-q:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .quiz-counter {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }

      /* Quiz Result */
      .quiz-result {
        text-align: center;
        padding: 8px 0;
      }
      .result-icon {
        font-size: 3.5rem;
        margin-bottom: 12px;
      }
      .result-score {
        font-size: 2rem;
        font-weight: 900;
        color: var(--green);
        margin-bottom: 4px;
      }
      .result-msg {
        color: var(--muted2);
        font-size: 13.5px;
        margin-bottom: 20px;
      }
      .btn-complete {
        background: linear-gradient(135deg, var(--green), var(--cyan));
        color: #071a0e;
        border: none;
        border-radius: 10px;
        padding: 12px 28px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        margin-bottom: 8px;
      }
      .btn-retry {
        background: var(--card2);
        color: var(--text);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 11px 28px;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        width: 100%;
      }

      /* ── STREAK BANNER ── */
      .streak-banner {
        background: linear-gradient(
          135deg,
          rgba(234, 179, 8, 0.12),
          rgba(249, 115, 22, 0.08)
        );
        border: 1.5px solid rgba(234, 179, 8, 0.3);
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .streak-num {
        font-size: 1.4rem;
        font-weight: 900;
        color: var(--yellow);
      }

      /* Animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.4s ease both;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .learn-sidebar {
          width: 220px;
        }
        .content-body {
          padding: 20px 18px;
        }
        .content-footer {
          padding: 14px 18px;
          flex-wrap: wrap;
        }
      }
      @media (max-width: 600px) {
        .learn-sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── NAVBAR ── -->
    <nav class="navbar-c">
      <div class="nav-inner">
        <a class="brand text-decoration-none" href="/index.html">
          <div class="brand-icon">M</div>
          <span class="brand-name">Maker<span class="g">Hub</span> MM</span>
        </a>
        <div class="nav-right">
          <button class="icon-btn" id="theme-toggle" title="Toggle theme">
            <i class="bi bi-sun-fill" id="theme-icon"></i>
          </button>
          <button class="back-btn" id="back-to-grid" style="display: none">
            <i class="bi bi-grid-3x3-gap"></i> All Topics
          </button>
        </div>
      </div>
    </nav>

    <!-- ══════════ ROADMAP VIEW ══════════ -->
    <div id="roadmap-view">

          color: "#22c55e",
          bg: "rgba(34,197,94,.08)",
          num: "10",
          title: "Serial Communication",
          sub: "Serial Monitor, Read & Print",
          mins: 10,
          content: {
            eyebrow: "Communication · Topic 10",
            title: "Serial Communication",
            sections: [
              {
                heading: "Serial Communication ဆိုတာ?",
                icon: "🌐",
                body: `Serial Communication ဆိုတာ Arduino နဲ့ Computer ကြားမှာ data တွေ ဖလှယ်ဆက်သွယ်တဲ့ နည်းလမ်းတစ်ခုဖြစ်ပါတယ်။ Arduino IDE မှာ Serial Monitor ပွင့်ပြီး debug လုပ်ဖို့ သတင်းပေးပို့ဖို့ အသုံးဝင်ပါတယ်။`,
              },
              {
                heading: "Serial Functions",
                icon: "📡",
                table: {
                  headers: ["Function", "အသုံးပြုပုံ"],
                  rows: [
                    [
                      "Serial.begin(9600)",
                      "Serial ကို 9600 baud rate နဲ့ စတင်",
                    ],
                    [
                      "Serial.print(data)",
                      "data ကို serial မှာ ပြ (newline မပါ)",
                    ],
                    [
                      "Serial.println(data)",
                      "data ကို serial မှာ ပြ (newline ပါ)",
                    ],
                    ["Serial.available()", "ဖတ်ဖို့ data ရှိမရှိ စစ်"],
                    ["Serial.read()", "Serial မှ byte တစ်ခု ဖတ်"],
                  ],
                },
              },
              {
                heading: "Complete Example",
                icon: "💻",
                code: `void setup() {
  Serial.begin(9600);           // Serial ကို ဖွင့်
  pinMode(A0, INPUT);           // A0 pin input
}

void loop() {
  int sensorVal = analogRead(A0);  // sensor ဖတ်
  Serial.print("Sensor: ");
  Serial.println(sensorVal);       // Computer မှာ ပြ
  delay(500);
}`,
                infoBox: {
                  type: "green",
                  text: "🖥️ Serial Monitor ဖွင့်ဖို့ Arduino IDE မှာ Tools → Serial Monitor ကို click (Ctrl+Shift+M) — baud rate ကို 9600 နဲ့ match ဖြစ်အောင် set လုပ်ပါ!",
                },
              },
              {
                heading: "Serial Input ဥပမာ",
                icon: "⌨️",
                code: `void loop() {
  if (Serial.available() > 0) {  // data ရောက်နေလား?
    char cmd = Serial.read();     // command ဖတ်
    if (cmd == '1') {
      digitalWrite(ledPin, HIGH); // '1' လာရင် LED ဖွင့်
    } else if (cmd == '0') {
      digitalWrite(ledPin, LOW);  // '0' လာရင် LED ပိတ်
    }
  }
}`,
              },
            ],
          },
          quiz: [
            {
              q: "Serial.begin(9600) မှာ 9600 ကဘာကို သတ်မှတ်သလဲ?",
              opts: ["Memory size", "Baud rate", "Pin number", "Frequency"],
              ans: 1,
              exp: "9600 ဟာ baud rate (bits per second) ဖြစ်ပါတယ် — Computer နဲ့ Arduino ကြားမှာ communication speed",
            },
            {
              q: "Serial.println() နဲ့ Serial.print() ကွာခြားချက်?",
              opts: [
                "မကွာဘူး",
                "println ဟာ newline ထည့်",
                "print ဟာ integer only",
                "println ဟာ faster",
              ],
              ans: 1,
              exp: "Serial.println() ဟာ output ပြီးနောက် newline (\\n) ထပ်ထည့်ပေးပါတယ်",
            },
            {
              q: "Serial.available() ဘာ return ပြန်သလဲ?",
              opts: [
                "true/false",
                "ဖတ်ဖို့ available bytes အရေအတွက်",
                "data တန်ဖိုး",
                "baud rate",
              ],
              ans: 1,
              exp: "Serial.available() ဟာ serial buffer မှာ ဖတ်ဖို့ ready ဖြစ်နေတဲ့ bytes အရေအတွက် return ပြန်ပါတယ်",
            },
          ],
        },
      ];

      /* ════════════════════════════
   STATE
════════════════════════════ */
      let completed = JSON.parse(localStorage.getItem("mh_done") || "[]");
      let streakDays = parseInt(localStorage.getItem("mh_streak") || "0");
      let lastStudy = localStorage.getItem("mh_last") || "";
      let currentTopic = null;
      let currentSection = 0;

      /* ════════════════════════════
   THEME
════════════════════════════ */
      const html = document.documentElement;
      const themeBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");
      let isDark = localStorage.getItem("mh_theme") !== "light";
      function applyTheme() {
        html.setAttribute("data-theme", isDark ? "dark" : "light");
        themeIcon.className = isDark
          ? "bi bi-sun-fill"
          : "bi bi-moon-stars-fill";
      }
      applyTheme();
      themeBtn.addEventListener("click", () => {
        isDark = !isDark;
        localStorage.setItem("mh_theme", isDark ? "dark" : "light");
        applyTheme();
      });

      /* ════════════════════════════
   STREAK
════════════════════════════ */
      function updateStreak() {
        const today = new Date().toDateString();
        if (lastStudy !== today) {
          const yesterday = new Date(Date.now() - 86400000).toDateString();
          if (lastStudy === yesterday) streakDays++;
          else streakDays = 1;
          lastStudy = today;
          localStorage.setItem("mh_streak", streakDays);
          localStorage.setItem("mh_last", today);
        }
        document.getElementById("streak-count").textContent =
          streakDays + " Day Streak!";
        // dots — last 7 days
        const dots = document.getElementById("streak-dots");
        dots.innerHTML = "";
        for (let i = 6; i >= 0; i--) {
          const d = document.createElement("div");
          d.style.cssText = `width:10px;height:10px;border-radius:3px;background:${i === 0 ? "var(--yellow)" : i < streakDays ? "var(--green)" : "var(--border2)"};`;
          dots.appendChild(d);
        }
      }

      /* ════════════════════════════
   ROADMAP GRID
════════════════════════════ */
      function renderGrid() {
        const grid = document.getElementById("topic-grid");
        const done = completed.length;
        document.getElementById("main-progress-fill").style.width =
          (done / TOPICS.length) * 100 + "%";
        document.getElementById("main-progress-label").textContent =
          done + " / " + TOPICS.length + " done";

        grid.innerHTML = TOPICS.map((t, i) => {
          const isDone = completed.includes(t.id);
          const isActive =
            !isDone && (i === 0 || completed.includes(TOPICS[i - 1].id));
          const isLocked = !isDone && !isActive;
          return `
    <div class="col-6 col-md-4 col-lg-3 col-xl-2">
      <div class="topic-card ${isDone ? "completed" : ""} ${isLocked ? "locked" : ""} fade-up"
           style="animation-delay:${i * 0.05}s;"
           onclick="${isLocked ? "" : "openTopic(" + t.id + ")"}">
        <div class="topic-card-top" style="background:${t.bg}">
          <span style="font-size:2.2rem;">${t.emoji}</span>
          <div class="topic-status ${isDone ? "status-done" : isActive ? "status-active" : "status-lock"}">
            ${isDone ? "✓" : isActive ? "▶" : "🔒"}
          </div>
        </div>
        <div class="topic-card-body">
          <div class="topic-num" style="color:${t.color}">${t.num}</div>
          <div class="topic-title">${t.title}</div>
          <div class="topic-meta">
            <span><i class="bi bi-clock" style="font-size:10px;margin-right:2px;"></i>${t.mins} min</span>
            <span style="color:${isDone ? "var(--green)" : isActive ? "var(--blue)" : "var(--muted)"}">
              ${isDone ? "✅ Done" : isActive ? "▶ Start" : "🔒 Locked"}
            </span>
          </div>
        </div>
      </div>
    </div>`;
        }).join("");
        updateStreak();
      }

      /* ════════════════════════════
   OPEN TOPIC
════════════════════════════ */
      function openTopic(id) {
        currentTopic = TOPICS.find((t) => t.id === id);
        currentSection = 0;
        document.getElementById("roadmap-view").style.display = "none";
        document.getElementById("learn-view").style.display = "block";
        document.getElementById("back-to-grid").style.display = "flex";
        updateStreak();
        renderSidebar();
        renderContent();
      }

      function closeTopic() {
        document.getElementById("learn-view").style.display = "none";
        document.getElementById("roadmap-view").style.display = "block";
        document.getElementById("back-to-grid").style.display = "none";
        currentTopic = null;
        renderGrid();
      }
      document
        .getElementById("back-to-grid")
        .addEventListener("click", closeTopic);

      /* ════════════════════════════
   SIDEBAR
════════════════════════════ */
      function renderSidebar() {
        const nav = document.getElementById("sidebar-nav");
        const sections = currentTopic.content.sections;
        nav.innerHTML = sections
          .map((s, i) => {
            const done = i < currentSection;
            const active = i === currentSection;
            return `<div class="sidebar-item ${active ? "active" : ""} ${done ? "done-item" : ""}" onclick="goToSection(${i})">
      <div class="sidebar-item-num" style="${active ? "background:rgba(34,197,94,.15);color:var(--green)" : ""}">${i + 1}</div>
      <div class="sidebar-item-title">${s.heading}</div>
      ${done ? '<i class="bi bi-check-circle-fill sidebar-item-check"></i>' : ""}
    </div>`;
          })
          .join("");
        // progress
        const pct = Math.round((currentSection / sections.length) * 100);
        document.getElementById("sidebar-progress-fill").style.width =
          pct + "%";
        document.getElementById("sidebar-progress-text").textContent =
          pct + "% complete";
      }

      function goToSection(i) {
        currentSection = i;
        renderSidebar();
        renderContent();
      }

      /* ════════════════════════════
   CONTENT
════════════════════════════ */
      function renderContent() {
        const sec = currentTopic.content.sections[currentSection];
        const c = currentTopic.content;
        const isLast = currentSection === c.sections.length - 1;
        const isDone = completed.includes(currentTopic.id);

        let html2 = `
    <div style="font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:${currentTopic.color};margin-bottom:8px;">${c.eyebrow}</div>
    <h1 class="content-title">${c.title}</h1>
    <div class="content-section">
      <h3 style="color:${currentTopic.color};">${sec.icon || ""} ${sec.heading}</h3>
  `;

        if (sec.body) html2 += `<p>${sec.body}</p>`;
        if (sec.extra) html2 += `<p>${sec.extra}</p>`;
        if (sec.code)
          html2 += `<div class="code-block"><span class="code-label">Arduino Code</span><pre>${sec.code}</pre></div>`;
        if (sec.table) {
          html2 += `<table class="data-table"><thead><tr>${sec.table.headers.map((h) => `<th>${h}</th>`).join("")}</tr></thead><tbody>`;
          html2 += sec.table.rows
            .map((r) => `<tr>${r.map((c2) => `<td>${c2}</td>`).join("")}</tr>`)
            .join("");
          html2 += `</tbody></table>`;
        }
        if (sec.infoBox) {
          const cls =
            sec.infoBox.type === "green"
              ? "info-box-green"
              : sec.infoBox.type === "blue"
                ? "info-box-blue"
                : "info-box-orange";
          html2 += `<div class="info-box ${cls}">${sec.infoBox.text}</div>`;
        }
        html2 += `</div>`;

        // Section nav dots
        html2 += `<div style="display:flex;gap:6px;margin-top:24px;">`;
        c.sections.forEach((_, i) => {
          html2 += `<div onclick="goToSection(${i})" style="width:8px;height:8px;border-radius:100px;background:${i === currentSection ? currentTopic.color : "var(--border2)"};cursor:pointer;transition:all .2s;${i < currentSection ? "background:var(--green)" : ""}"></div>`;
        });
        html2 += `</div>`;

        document.getElementById("content-body").innerHTML = html2;

        // Buttons
        const prevBtn = document.getElementById("btn-prev");
        const nextBtn = document.getElementById("btn-next");
        const quizBtn = document.getElementById("btn-start-quiz");
        prevBtn.disabled = currentSection === 0;
        nextBtn.style.display = isLast ? "none" : "flex";
        quizBtn.style.display = isLast ? "flex" : "none";
        if (isDone)
          quizBtn.innerHTML =
            '<i class="bi bi-patch-check-fill"></i> Completed! Retake Quiz';

        renderSidebar();
      }

      document.getElementById("btn-prev").addEventListener("click", () => {
        if (currentSection > 0) {
          currentSection--;
          renderContent();
        }
      });
      document.getElementById("btn-next").addEventListener("click", () => {
        if (currentSection < currentTopic.content.sections.length - 1) {
          currentSection++;
          renderContent();
        }
      });

      /* ════════════════════════════
   QUIZ
════════════════════════════ */
      let quizIndex = 0;
      let quizScore = 0;
      let quizAnswered = false;
      let quizQuestions = [];

      document
        .getElementById("btn-start-quiz")
        .addEventListener("click", startQuiz);
      document
        .getElementById("quiz-close")
        .addEventListener("click", closeQuiz);

      function startQuiz() {
        quizQuestions = currentTopic.quiz;
        quizIndex = 0;
        quizScore = 0;
        quizAnswered = false;
        document.getElementById("quiz-overlay").style.display = "flex";
        renderQuizQuestion();
      }

      function closeQuiz() {
        document.getElementById("quiz-overlay").style.display = "none";
      }

      function renderQuizQuestion() {
        const q = quizQuestions[quizIndex];
        const modal = document.getElementById("quiz-modal");
        quizAnswered = false;

        const dots = quizQuestions
          .map(
            (_, i) =>
              `<div class="quiz-dot ${i < quizIndex ? "done" : i === quizIndex ? "current" : ""}"></div>`,
          )
          .join("");

        modal.innerHTML = `
    <button class="quiz-close" id="quiz-close2"><i class="bi bi-x"></i></button>
    <div class="quiz-eyebrow">📝 Quiz — ${currentTopic.title}</div>
    <div class="quiz-progress-bar">${dots}</div>
    <div class="quiz-question-title">${q.q}</div>
    <div class="quiz-options">
      ${q.opts.map((o, i) => `<button class="quiz-opt" onclick="selectAnswer(${i})">${String.fromCharCode(65 + i)}. ${o}</button>`).join("")}
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div class="quiz-nav">
      <span class="quiz-counter">Question ${quizIndex + 1} / ${quizQuestions.length}</span>
      <button class="btn-next-q" id="btn-next-q" disabled onclick="nextQuestion()">
        ${quizIndex === quizQuestions.length - 1 ? "See Result" : "Next"} <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  `;
        document
          .getElementById("quiz-close2")
          .addEventListener("click", closeQuiz);
      }

      function selectAnswer(idx) {
        if (quizAnswered) return;
        quizAnswered = true;
        const q = quizQuestions[quizIndex];
        const opts = document.querySelectorAll(".quiz-opt");
        const fb = document.getElementById("quiz-feedback");
        const nextBtn = document.getElementById("btn-next-q");

        opts[idx].classList.add(idx === q.ans ? "correct" : "wrong");
        opts[q.ans].classList.add("correct");

        if (idx === q.ans) {
          quizScore++;
          fb.className = "quiz-feedback correct show";
          fb.innerHTML = `✅ မှန်ပါသည်! ${q.exp}`;
        } else {
          fb.className = "quiz-feedback wrong show";
          fb.innerHTML = `❌ မမှန်ပါ။ ${q.exp}`;
        }
        nextBtn.disabled = false;
      }

      function nextQuestion() {
        quizIndex++;
        if (quizIndex >= quizQuestions.length) {
          showResult();
        } else {
          renderQuizQuestion();
        }
      }

      function showResult() {
        const modal = document.getElementById("quiz-modal");
        const pct = Math.round((quizScore / quizQuestions.length) * 100);
        const pass = pct >= 60;
        const emoji =
          pct === 100 ? "🏆" : pct >= 80 ? "🌟" : pass ? "✅" : "😅";

        modal.innerHTML = `
    <div class="quiz-result">
      <div class="result-icon">${emoji}</div>
      <div class="result-score">${quizScore} / ${quizQuestions.length}</div>
      <div style="font-size:1.3rem;font-weight:900;margin-bottom:6px;">${pct}% ${pass ? "Passed!" : "Try Again"}</div>
      <div class="result-msg">${
        pass
          ? `ဒီ topic ကို ${pass ? "ကောင်းမွန်စွာ" : ""}နားလည်ပြီ! ဂုဏ်ယူပါတယ် 🎉`
          : `60% ရဖို့ အနည်းဆုံး မှန်ဖို့ လိုပါတယ်။ ပြန်ကြိုးစားပါ!`
      }
      </div>
      ${
        pass
          ? `<button class="btn-complete" onclick="completeTopic()">✅ Mark as Complete & Continue</button>`
          : `<button class="btn-complete" onclick="startQuiz()">🔄 Retake Quiz</button>`
      }
      <button class="btn-retry" onclick="closeQuiz()">📖 Review Content</button>
    </div>
  `;
      }

      function completeTopic() {
        if (!completed.includes(currentTopic.id)) {
          completed.push(currentTopic.id);
          localStorage.setItem("mh_done", JSON.stringify(completed));
        }
        closeQuiz();
        closeTopic();
      }

      /* ════════════════════════════
   INIT
════════════════════════════ */
      window.openTopic = openTopic;
      window.goToSection = goToSection;
      window.selectAnswer = selectAnswer;
      window.nextQuestion = nextQuestion;
      window.completeTopic = completeTopic;
      window.startQuiz = startQuiz;
      renderGrid();
    </script>
  </body>
</html>
